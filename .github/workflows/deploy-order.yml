name: Order Service CI/CD

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # This adds the manual "Run" button!

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        # Notice the "." at the end! It tells Docker the file is in the root folder.
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/book-corner-order-service:latest .

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/book-corner-order-service:latest
